[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Route the API endpoints to their functions (must come before the SPA fallback)
[[redirects]]
  from = "/api/state"
  to = "/.netlify/functions/state"
  status = 200

[[redirects]]
  from = "/api/sync"
  to = "/.netlify/functions/sync"
  status = 200

# SPA fallback — serve index.html for any other route
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
